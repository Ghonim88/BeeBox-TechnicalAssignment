# BeeBox CI/CD pipeline.
#
# Designed for a self-hosted runner (shell executor) on a Linux host that has
# Docker, Terraform, Ansible, Python 3 and Make available. The pipeline runs the
# same Makefile targets used locally, so "the pipeline is the proof" that the
# system provisions, configures and serves correctly on a clean machine.

stages:
  - lint
  - build
  - configure
  - test
  - cleanup

variables:
  # In CI we hit the load balancer on the runner's published localhost port.
  LB_HOSTNAME: "localhost"
  LB_PORT: "8080"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# =====================================================================
# 1. LINT / VALIDATION
# =====================================================================
validate:
  stage: lint
  script:
    - python3 -m pip install --quiet --upgrade yamllint flake8
    - terraform -chdir=terraform fmt -check -recursive
    - terraform -chdir=terraform init -backend=false -input=false
    - terraform -chdir=terraform validate
    - yamllint -c .yamllint .
    - flake8 app
    - bash -n scripts/*.sh

ansible-lint:
  stage: lint
  # Style/advisory linting: report but don't block the pipeline.
  allow_failure: true
  script:
    - python3 -m pip install --quiet --upgrade ansible ansible-lint
    - ansible-galaxy collection install -r ansible/requirements.yml
    - cd ansible && ansible-lint

# =====================================================================
# 2. BUILD INFRASTRUCTURE (Terraform)
# =====================================================================
build:
  stage: build
  script:
    - make up
  artifacts:
    # Pass Terraform state so the cleanup stage can destroy the infra.
    paths:
      - terraform/terraform.tfstate
      - terraform/.terraform.lock.hcl
    expire_in: 1 day

# =====================================================================
# 3. CONFIGURE SERVERS (Ansible)
# =====================================================================
configure:
  stage: configure
  script:
    - make configure
  artifacts:
    when: always
    paths:
      - reports/   # lynis audit evidence (one per host)
    expire_in: 1 week

# =====================================================================
# 4. TEST (call the LB endpoint, assert JSON + round-robin)
# =====================================================================
test:
  stage: test
  script:
    - make test

# =====================================================================
# 5. CLEANUP (always tear the infra down)
# =====================================================================
cleanup:
  stage: cleanup
  when: always
  allow_failure: true
  script:
    - terraform -chdir=terraform init -input=false
    - terraform -chdir=terraform destroy -auto-approve
